name: Backend CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

permissions:
  pull-requests: write
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libgl1

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8 black

      - name: Code Formatting Check (Black)
        run: |
          black --check app/ run.py --exclude venv/ || echo "Formatting checks failed."

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=venv/
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=venv/

      - name: Verify Python Compilation
        run: |
          python -m py_compile run.py app/__init__.py app/main.py

  create-pull-request:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create or Update Pull Request
        run: |
          # Use GitHub CLI to check if PR already exists, and create it if not
          PR_EXISTS=$(gh pr list --base main --head dev --json number --jq '.[0].number')
          if [ -z "$PR_EXISTS" ]; then
            echo "Creating a new Pull Request..."
            gh pr create --title "CI Passed: Merge dev into main" --body "Automated Pull Request generated by GitHub Actions after successful CI run on the dev branch. Please review and merge manually to deliver changes." --base main --head dev
          else
            echo "Pull Request already exists: PR #$PR_EXISTS"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production # Requires manual approval setting in GitHub UI to proceed
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Backend (Continuous Delivery Manual Gate)
        run: |
          echo "Manual gate passed / Approved!"
          echo "Deploying the backend service..."
          # Insert actual server deployment commands here (e.g. ssh, docker-compose pull, etc.)
